[main]
font=SF Pro Display:size=12
dpi-aware=auto
width=30%
lines=10
tabs=2
prompt=  
password-character=*
layer=overlay
exit-on-keyboard-focus-loss=yes
inner-pad=12
outside-margin=0
border-width=1
border-radius=12

[colors]
background={{colors.surface_container.default.hex}}ff
text={{colors.on_surface.default.hex}}ff
match={{colors.primary.default.hex}}ff
selection={{colors.primary_container.default.hex}}ff
selection-text={{colors.primary.default.hex}}ff
selection-match={{colors.tertiary.default.hex}}ff
border={{colors.outline_variant.default.hex}}ff
