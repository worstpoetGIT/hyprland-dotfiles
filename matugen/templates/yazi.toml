[manager]
cwd = { fg = "{{colors.primary.default.hex}}" }
hovered = { fg = "{{colors.on_primary_container.default.hex}}", bg = "{{colors.primary_container.default.hex}}", bold = true }
preview_hovered = { underline = true }
find_keyword  = { fg = "{{colors.tertiary.default.hex}}", bold = true }
find_position = { fg = "{{colors.on_tertiary.default.hex}}", bg = "{{colors.tertiary.default.hex}}", bold = true }
marker_selected = { fg = "{{colors.secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}" }
marker_copied   = { fg = "{{colors.tertiary.default.hex}}", bg = "{{colors.tertiary.default.hex}}" }
marker_cut      = { fg = "{{colors.error.default.hex}}", bg = "{{colors.error.default.hex}}" }

[status]
overall = { bg = "{{colors.surface.default.hex}}" }
mode_normal = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}", bold = true }
mode_select = { fg = "{{colors.on_secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}", bold = true }
mode_unset  = { fg = "{{colors.on_tertiary.default.hex}}", bg = "{{colors.tertiary.default.hex}}", bold = true }

[select]
border   = { fg = "{{colors.primary.default.hex}}" }
active   = { fg = "{{colors.on_primary_container.default.hex}}", bg = "{{colors.primary_container.default.hex}}" }
inactive = { fg = "{{colors.on_surface_variant.default.hex}}" }

[input]
border   = { fg = "{{colors.primary.default.hex}}" }
title    = { fg = "{{colors.primary.default.hex}}" }
value    = { fg = "{{colors.on_surface.default.hex}}" }
selected = { bg = "{{colors.primary_container.default.hex}}" }

[completion]
border  = { fg = "{{colors.primary.default.hex}}" }
active  = { bg = "{{colors.primary_container.default.hex}}" }

[tasks]
border  = { fg = "{{colors.primary.default.hex}}" }
title   = { fg = "{{colors.primary.default.hex}}" }
hovered = { underline = true }

[filetype]
rules = [
  { mime = "image/*",       style = { fg = "{{colors.tertiary.default.hex}}" } },
  { mime = "video/*",       style = { fg = "{{colors.secondary.default.hex}}" } },
  { mime = "audio/*",       style = { fg = "{{colors.primary.default.hex}}" } },
  { mime = "application/zip", style = { fg = "{{colors.error.default.hex}}" } },
  { mime = "text/*",        style = { fg = "{{colors.on_surface_variant.default.hex}}" } },
]
