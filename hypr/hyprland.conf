# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,1.25


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = hyprlauncher


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = hypridle
exec-once = ~/.config/hypr/scripts/session-start.sh
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = ~/.config/hypr/scripts/fullscreen-waybar.sh
exec-once = echo powersave | sudo tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor
exec-once = mako
exec-once = ~/.config/hypr/waybar-fullscreen.sh

# Audio input setup
exec-once = wpctl set-default $(pactl list short sources | grep "Mic1" | awk '{print $1}')

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_THEME, MacOSX
env = XCURSOR_SIZE,24

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 20
    gaps_out = 100

    border_size = 0	

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors

          col.active_border =rgb(000000)
          col.inactive_border = rgb(000000)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

    # Change transparency of focused and unfocused windows
decoration {
    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true
        xray = false
        ignore_opacity = true
    }
    rounding = 12
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(0, 0, 0, 0.3)
    }
}

layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0.3, match:namespace notifications

# https://wiki.hypr.land/Configuring/Variables/#animations

animations {
    enabled = yes

    # smoother curves
    bezier = menuDecel, 0.05, 0.9, 0.1, 1.0
    bezier = menuAccel, 0.3, 0.0, 0.8, 0.15
    bezier = menuSmooth, 0.22, 1.0, 0.36, 1.0

    # general
    animation = global, 1, 5, menuSmooth

    # windows
    animation = windows, 1, 4, menuSmooth, slide
    animation = windowsIn, 1, 4, menuDecel, slide
    animation = windowsOut, 1, 3, menuAccel, slide
    animation = windowsMove, 1, 3, menuSmooth

    # fades
    animation = fade, 1, 3, menuSmooth
    animation = fadeIn, 1, 2, menuDecel
    animation = fadeOut, 1, 2, menuAccel

    # workspaces
    animation = workspaces, 1, 4, menuSmooth, slidefade

    # IMPORTANT: this affects fuzzel/opening menus
    animation = layers, 1, 4, menuSmooth, slide
    animation = layersIn, 1, 3, menuDecel, slide
    animation = layersOut, 1, 2, menuAccel, slide

}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more

dwindle {
   # pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    disable_splash_rendering = true
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = gb
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0.5 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat

    touchpad {
        natural_scroll = true
    }
}

# See https://wiki.hypr.land/Configuring/Gestures

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = hs6209-2.4g-wireless-receiver-mouse
    sensitivity = 1.0
    accel_profile = flat

gesture = 3, left, dispatcher, movewindow, l
gesture = 3, right, dispatcher, movewindow, r
}

###################
### KEYBINDINGS ###
###################

exec-once = swayosd-server

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, F, togglefloating
bind = $mainMod, D, exec, rofi -show drun -theme ~/.config/rofi/theme.rasi -theme-str 'window { width: 420px; } listview { lines: 6; }'
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
bind = $mainMod, R, exec, ~/.config/waybar/scripts/launch.sh
bindel = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness.sh up
bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh down
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise --max volume 125
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower --max volume 125
bindel = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = $mainMod, W, exec, ~/.config/rofi/wallpaper-menu.sh
bind = CTRL, M, exec, ~/.config/rofi/hyprshot-menu.sh
bind = CTRL, P, exec, ~/.config/hypr/scripts/screenrecord-toggle.sh
bind = $mainMod, L, exit
bind = $mainMod, G, exec, env XDG_CURRENT_DESKTOP=GNOME gnome-control-center
bind = $mainMod, F1, exec, hyprctl layers > /tmp/hypr-layers.txt
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, exec, ~/.config/hypr/toggle-fullscreen-all.sh

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness.sh up
bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh down

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = dunst-noborder
    match:class = dunst
    border_size = 0
}

# Blurs

blurls = waybar
blurls = left-sidebar
blurls = right-sidebar
blurls = rofi
blurls = nwg-dock-hyprland
bind = $mainMod, A, exec, ags toggle left-sidebar
bind = $mainMod, C, exec, ~/.config/ags/reload-colors.sh
exec-once = ~/.config/ags/watch-wallpaper.sh
bind = $mainMod, K, exec, ags toggle right-sidebar
exec-once = ags run -g 4 /home/worst_poet/.config/ags/app.js --log-file /tmp/ags.log
bind = SUPER, B, exec, ~/.config/hypr/scripts/toggle-black.sh
